<!DOCTYPE html>
<html>

<head>
  <script async="" src="https://cdn.splitbee.io/sb.js"></script>
  <title>$title$</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="description" content='$description$'>
  <link rel="canonical" href="$base_url$/blog/$slug$.html">
  <meta property="og:site_name" content="Matt Brown">
  <meta property="og:type" content="article">
  <meta property="og:title" content='$title$'>
  <meta property="og:description" content='$description$'>
  <meta property="og:url" content="$base_url$/blog/$slug$.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content='$title$'>
  <meta name="twitter:description" content='$description$'>
$if(image)$  <meta property="og:image" content="$base_url$/$image$">
  <meta name="twitter:image" content="$base_url$/$image$">
$endif$
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico">
  <link rel="manifest" href="/favicon_io/site.webmanifest">
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/analytics.js"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/v4-shims.min.css"
    integrity="sha512-ARfx5eajdcCAuWvuJrgUuJ6D25ON3KZRTCghNXXKeJldCQJ5bXS+6CvG2EhcFWITF95uwZydzpufSKvhmSpTxA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <nav class="navbar is-transparent" role="navigation" aria-label="main navigation">
    <div class="container is-narrow-nav">
      <div class="navbar-brand">
        <a class="navbar-item" href="/" aria-label="Matt Brown home">
          <span class="mb-logo">MB</span>
        </a>
        <a class="navbar-burger" role="button" aria-label="menu" aria-expanded="false" data-target="#navMenu">
          <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span></a>
      </div>
      <div class="navbar-menu is-shadowless" id="navMenu">
        <div class="navbar-start">
          <a class="navbar-item has-text-weight-normal" href="/#projects">Projects</a>
          <a class="navbar-item has-text-weight-normal" href="/blog/">Blog</a>
          <a class="navbar-item has-text-weight-normal" href="/#about">About</a>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <a class="button is-primary is-outlined is-rounded has-text-weight-normal" target="_blank"
              href="https://calendly.com/matt-1176">
              Book a meeting</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <section class="section blog-post" style="padding-top:1.5rem;">
    <div class="container is-narrow" style="max-width:720px;">
      <header class="blog-post-header" style="text-align:left;margin-bottom:2.5rem;">
        <h1 class="title is-spaced is-size-2-desktop is-size-3-mobile" style="color:#141c3a;text-align:left;">
          $title$
        </h1>
        <div class="blog-byline"
          style="display:flex;align-items:center;gap:0.55rem;color:#8a8fa3;font-size:0.95rem;margin-top:0.75rem;">
          <span style="color:#41476b;font-weight:600;">$if(author)$$author$$else$Matt Brown$endif$</span>
          <span aria-hidden="true">·</span>
          <span>$date$</span>$if(category)$
          <span aria-hidden="true">·</span>
          <span>$category$</span>$endif$
        </div>
      </header>
$if(image)$
      <figure class="blog-featured-image" style="margin:0 0 2.75rem;">
        <img src="/$image$" alt="$if(image_alt)$$image_alt$$else$$title$$endif$"
          style="display:block;width:100%;height:auto;border-radius:10px;">
      </figure>
$endif$
      <article class="content blog-article">
$body$
      </article>

      <div class="has-text-centered">
        <a class="button is-primary is-rounded is-medium has-text-weight-normal" target="_blank" href="https://calendly.com/matt-1176">
          <span class="icon"><i class="fa-solid fa-comments"></i></span><span>$if(cta)$$cta$$else$Work with me$endif$</span></a>
      </div>

      <p class="has-text-centered" style="margin-top:1.5rem;">
        <a href="/blog/" style="color:#6495ED;">&larr; Back to all posts</a>
      </p>
    </div>
  </section>

  <footer class="footer-slim is-primary has-text-centered">
    <div class="container is-narrow">
      <div class="social-icons">
        <p class="field">
          <a class="button" href="https://www.linkedin.com/in/matthew-brown-44b91017/" target="_blank">
            <span class="icon is-small"><i class="fab fa-linkedin-in fa-fw"></i></span>
          </a>
          <a class="button" href="https://github.com/MattBrown88" target="_blank">
            <span class="icon is-small"><i class="fa-brands fa-github"></i></span></a>
          <a class="button" href="mailto:matt@gosolucia.com"><span class="icon is-small"><i
                class="far fa-envelope fa-fw"></i></span></a>
        </p>
      </div>
      <p class="footer-copy">&copy; <span id="footer-year">2026</span> Matt Brown. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="/js/main-min.js"></script>
  <script>
    // Keep the footer copyright year current
    (function () {
      var yearEl = document.getElementById('footer-year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();
    })();
  </script>
</body>

</html>

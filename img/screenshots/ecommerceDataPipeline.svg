<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="E-commerce data pipeline: Shopify storefronts flow into a BigQuery warehouse, are transformed with dbt, and surface as revenue, marketing, and customer analytics.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6495ED"/>
      <stop offset="1" stop-color="#2bb6a3"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <style>
      .lbl { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; fill:#ffffff; }
      .node { fill:#ffffff; fill-opacity:0.14; stroke:#ffffff; stroke-opacity:0.85; stroke-width:2; }
      .ico  { fill:none; stroke:#ffffff; stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round; }
      .icof { fill:#ffffff; }
      .conn { stroke:#ffffff; stroke-opacity:0.55; stroke-width:2.4; fill:none; stroke-dasharray:7 7; }
      .dot  { fill:#ffffff; }
    </style>
  </defs>

  <!-- background is provided by the .project-cover container gradient so the
       artwork can be letterboxed (object-fit: contain) without seams -->

  <!-- subtle grid accents -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
  </g>

  <text class="lbl" x="32" y="44" font-size="22" font-weight="700">E-commerce Data Pipeline</text>

  <!-- connectors -->
  <path class="conn" d="M150 168 H236"/>
  <path class="conn" d="M340 168 H426"/>
  <path class="conn" d="M530 168 H560"/>

  <!-- animated flow pulses -->
  <g class="dot">
    <circle r="4" cy="168" cx="150">
      <animate attributeName="cx" values="150;236" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cy="168" cx="340">
      <animate attributeName="cx" values="340;426" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== Stage 1: Shopify storefronts (source) ===== -->
  <g transform="translate(48,108)">
    <rect class="node" x="0" y="0" width="102" height="120" rx="16"/>
    <!-- shopping bag -->
    <g transform="translate(33,28)">
      <path class="ico" d="M6 14 H30 L34 52 H2 Z"/>
      <path class="ico" d="M12 14 V9 a6 6 0 0 1 12 0 V14"/>
    </g>
    <text class="lbl" x="51" y="100" font-size="14" font-weight="600" text-anchor="middle">Storefronts</text>
  </g>

  <!-- ===== Stage 2: Ingest / ETL ===== -->
  <g transform="translate(238,108)">
    <rect class="node" x="0" y="0" width="102" height="120" rx="16"/>
    <!-- pipe / transform gears -->
    <g transform="translate(51,52)">
      <circle class="ico" r="15"/>
      <path class="ico" d="M0 -22 V-15 M0 22 V15 M-22 0 H-15 M22 0 H15 M-15.5 -15.5 L-10.6 -10.6 M15.5 15.5 L10.6 10.6 M15.5 -15.5 L10.6 -10.6 M-15.5 15.5 L-10.6 10.6"/>
      <circle class="icof" r="4"/>
    </g>
    <text class="lbl" x="51" y="100" font-size="14" font-weight="600" text-anchor="middle">Ingest + dbt</text>
  </g>

  <!-- ===== Stage 3: BigQuery warehouse ===== -->
  <g transform="translate(428,108)">
    <rect class="node" x="0" y="0" width="102" height="120" rx="16"/>
    <!-- database cylinder -->
    <g transform="translate(33,26)">
      <path class="ico" d="M0 8 C0 2 36 2 36 8 V44 C36 50 0 50 0 44 Z"/>
      <path class="ico" d="M0 8 C0 14 36 14 36 8"/>
      <path class="ico" d="M0 26 C0 32 36 32 36 26"/>
    </g>
    <text class="lbl" x="51" y="100" font-size="14" font-weight="600" text-anchor="middle">BigQuery</text>
  </g>

  <!-- ===== Stage 4: Analytics dashboard ===== -->
  <g transform="translate(560,96)">
    <rect class="node" x="0" y="0" width="56" height="144" rx="14"/>
    <!-- mini bar chart -->
    <g transform="translate(14,34)">
      <line class="ico" x1="0" y1="0" x2="0" y2="74"/>
      <line class="ico" x1="0" y1="74" x2="30" y2="74"/>
      <rect class="icof" x="4"  y="44" width="6" height="30" rx="2"/>
      <rect class="icof" x="14" y="28" width="6" height="46" rx="2"/>
      <rect class="icof" x="24" y="12" width="6" height="62" rx="2"/>
    </g>
  </g>

  <!-- output metric tags -->
  <g class="lbl" font-size="13" font-weight="600">
    <text x="320" y="296" text-anchor="middle" font-size="14" fill-opacity="0.92">Revenue&#160;&#160;&#183;&#160;&#160;Marketing&#160;&#160;&#183;&#160;&#160;Customers</text>
  </g>
</svg>

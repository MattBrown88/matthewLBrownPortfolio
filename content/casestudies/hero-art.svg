<svg xmlns="http://www.w3.org/2000/svg" width="700" height="520" viewBox="0 0 700 520" role="img" aria-label="Abstract manufacturing art">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071A44"/>
      <stop offset="1" stop-color="#0052CC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#70D6FF"/>
      <stop offset="1" stop-color="#4EA3FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#70D6FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#70D6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="700" height="520" fill="url(#bg)"/>

  <!-- dotted grid texture -->
  <g fill="#70D6FF" opacity="0.16">
    <!-- generated dot field -->
    <g>
      <circle cx="40"  cy="40"  r="3"/><circle cx="100" cy="40"  r="3"/><circle cx="160" cy="40" r="3"/><circle cx="220" cy="40" r="3"/>
      <circle cx="40"  cy="100" r="3"/><circle cx="100" cy="100" r="3"/><circle cx="160" cy="100" r="3"/>
      <circle cx="40"  cy="160" r="3"/><circle cx="100" cy="160" r="3"/>
      <circle cx="600" cy="460" r="3"/><circle cx="540" cy="460" r="3"/><circle cx="480" cy="460" r="3"/><circle cx="420" cy="460" r="3"/>
      <circle cx="600" cy="400" r="3"/><circle cx="540" cy="400" r="3"/><circle cx="480" cy="400" r="3"/>
      <circle cx="600" cy="340" r="3"/><circle cx="540" cy="340" r="3"/>
    </g>
  </g>

  <circle cx="520" cy="150" r="200" fill="url(#glow)"/>

  <!-- conveyor / flow lines -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M-20 360 H720"/>
    <path d="M-20 392 H720" opacity="0.5"/>
  </g>
  <g fill="#EAF4FF" opacity="0.9">
    <rect x="120" y="320" width="46" height="40" rx="6"/>
    <rect x="300" y="320" width="46" height="40" rx="6"/>
    <rect x="480" y="320" width="46" height="40" rx="6"/>
  </g>

  <!-- large gear -->
  <g transform="translate(250,210)" fill="url(#accent)">
    <g>
      <rect x="-12" y="-104" width="24" height="40" rx="4"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(45)"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(90)"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(135)"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(180)"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(225)"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(270)"/>
      <rect x="-12" y="-104" width="24" height="40" rx="4" transform="rotate(315)"/>
    </g>
    <circle r="78"/>
    <circle r="34" fill="#071A44"/>
  </g>

  <!-- small gear -->
  <g transform="translate(410,300)" fill="#70D6FF">
    <g>
      <rect x="-8" y="-72" width="16" height="28" rx="3"/>
      <rect x="-8" y="-72" width="16" height="28" rx="3" transform="rotate(60)"/>
      <rect x="-8" y="-72" width="16" height="28" rx="3" transform="rotate(120)"/>
      <rect x="-8" y="-72" width="16" height="28" rx="3" transform="rotate(180)"/>
      <rect x="-8" y="-72" width="16" height="28" rx="3" transform="rotate(240)"/>
      <rect x="-8" y="-72" width="16" height="28" rx="3" transform="rotate(300)"/>
    </g>
    <circle r="52"/>
    <circle r="22" fill="#071A44"/>
  </g>

  <!-- floating geometric accents -->
  <rect x="470" y="90" width="64" height="64" rx="14" fill="#4EA3FF" opacity="0.85" transform="rotate(18 502 122)"/>
  <circle cx="150" cy="110" r="26" fill="#70D6FF" opacity="0.8"/>
  <rect x="560" y="210" width="40" height="40" rx="10" fill="#EAF4FF" opacity="0.7" transform="rotate(-12 580 230)"/>
</svg>
